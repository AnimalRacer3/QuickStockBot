[build]
builder = "nixpacks"
buildCommand = "npm run db:generate && npm run build"

[deploy]
startCommand = "echo '=DIRS=' && ls /app && echo '=NEXT=' && ls /app/.next 2>/dev/null || echo 'no .next' && echo '=FIND=' && find /app -name 'server.js' -not -path '*/node_modules/*' 2>/dev/null && node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
