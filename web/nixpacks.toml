[phases.setup]
aptPkgs = ['python3', 'python3-dev', 'build-essential']

# --ignore-scripts skips the @prisma/engines postinstall, which downloads large
# binaries (~100 MB each) with no timeout and hangs the build indefinitely.
# Native modules are rebuilt explicitly; Prisma binaries are fetched in the
# build phase where prisma-generate.sh enforces curl timeouts.
[phases.install]
cmds = ['npm ci --ignore-scripts', 'npm rebuild argon2 better-sqlite3']

[phases.build]
cmds = ['npm run db:generate', 'npm run build']

[start]
cmd = "CHECKPOINT_DISABLE=1 node node_modules/prisma/build/index.js db push && node_modules/.bin/next start -p ${PORT:-3000}"
