name: CI

on:
  push:
    branches: [main, "claude/**", "section-**"]
  pull_request:
    branches: [main]

jobs:
  # ─── Python bot ──────────────────────────────────────────────────────────────
  bot:
    name: Bot (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src tests

      - name: Test (pytest)
        run: uv run pytest -v -m "not finbert"

  # ─── Node relay ──────────────────────────────────────────────────────────────
  relay:
    name: Relay (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: relay/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: Type check (tsc)
        run: npm run type-check

      - name: Test (vitest)
        run: npm test

  # ─── Next.js web ─────────────────────────────────────────────────────────────
  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          CHECKPOINT_DISABLE: "1"

      - name: Lint (next lint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: Type check (tsc)
        run: npm run type-check

      - name: Test (vitest)
        run: npm test
        env:
          SESSION_SECRET: "ci-test-secret-must-be-32-chars-x"

  # ─── Web E2E (Playwright) ────────────────────────────────────────────────────
  web-e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          CHECKPOINT_DISABLE: "1"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  # ─── Shared contracts ────────────────────────────────────────────────────────
  shared:
    name: Shared (contracts)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: shared/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate fixtures against schemas
        run: npm test
