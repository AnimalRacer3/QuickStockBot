name: Release

# Triggers on tags like v1.0, v1.3, v2.0
# Major bump: new features, settings changes, or config additions
# Minor bump: bug fixes and small tweaks with no settings/config changes
on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*'

jobs:
  build-and-release:
    name: Build Windows executables and publish release
    runs-on: windows-latest
    permissions:
      contents: write  # required to create releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      # ── Build bot executable ────────────────────────────────────────────────
      - name: Install bot dependencies
        working-directory: bot
        run: uv sync --dev

      - name: Build bot executable
        working-directory: bot
        run: uv run pyinstaller build.spec --noconfirm

      # ── Build installer executable (bundles the bot exe inside) ────────────
      - name: Install installer dependencies
        working-directory: installer
        run: uv sync --dev

      - name: Build installer executable
        working-directory: installer
        run: uv run pyinstaller build.spec --noconfirm

      # ── Write the README that ships inside the zip ──────────────────────────
      - name: Write zip README
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $content = @"
          QuickStockBot $version — Windows Distribution
          ================================================

          FILES IN THIS ZIP
          -----------------
          quickstockbot-installer.exe
            Setup wizard — run this first. Opens a browser-based wizard that
            walks you through all required settings and writes your config.
            The bot executable is bundled inside the installer; you do not need
            to copy quickstockbot.exe manually.

          quickstockbot.exe
            Standalone bot — runs the trading engine directly. Only use this
            if you have already run the installer and your config is in place.

          REQUIREMENTS BEFORE RUNNING THE INSTALLER
          ------------------------------------------
          Have the following ready:

            1. Relay URL
                 wss://quickstockbot-relay-production.up.railway.app/bot

            2. License Key
                 Issued to you when you subscribed. Format: QSB-XXXX-XXXX-XXXX-XXXX
                 Check your registration email if you cannot find it.

            3. Connection Password
                 Provided with your license. Must match the relay server setting.

            4. Alpaca API credentials
                 Paper-trading keys (required): from https://alpaca.markets
                 Live-trading keys (optional): only needed for real-money trading

            5. News API keys (all optional — Alpaca news is used by default)
                 Finnhub:  https://finnhub.io
                 NewsAPI:  https://newsapi.org
                 Benzinga: contact Benzinga for an API key

          INSTALLATION STEPS
          ------------------
            1. Double-click quickstockbot-installer.exe
               Windows may show a SmartScreen warning — click "More info" then
               "Run anyway". The installer is safe; it is unsigned because code
               signing certificates cost several hundred dollars per year.

            2. A browser tab opens automatically with the setup wizard.
               Work through each step and fill in your credentials.

            3. On the final step click "Connect & Install".
               The wizard tests your relay connection, writes your config, and
               registers the bot to start automatically when you log in.

            4. The bot is now running in the background. You can monitor it
               from your QuickStockBot dashboard.

          AUTOSTART
          ---------
          The installer registers the bot to start automatically on login using
          Windows Task Scheduler. To disable autostart, open Task Scheduler and
          delete the "QuickStockBot" task.

          UNINSTALLING
          ------------
          Re-run quickstockbot-installer.exe and choose the uninstall option,
          or manually delete:
            %LOCALAPPDATA%\QuickStockBot\     (config and logs)
            Task Scheduler task "QuickStockBot"

          LOGS
          ----
          %LOCALAPPDATA%\QuickStockBot\quickstockbot.log
          Attach this file when contacting support.

          OLDER VERSIONS
          --------------
          To download a specific version, replace "latest" in the download URL:
            Latest:  .../releases/latest/download/QuickStockBot-windows.zip
            Older:   .../releases/download/v1.0/QuickStockBot-windows.zip

          SUPPORT
          -------
          https://github.com/AnimalRacer3/QuickStockBot/issues
          "@
          # Remove leading whitespace from the heredoc
          $content = $content -replace '(?m)^          ', ''
          Set-Content -Path "QuickStockBot-README.txt" -Value $content -Encoding UTF8

      # ── Package into zip ────────────────────────────────────────────────────
      - name: Create release zip
        shell: pwsh
        run: |
          Compress-Archive -Path @(
            "bot\dist\quickstockbot.exe",
            "installer\dist\quickstockbot-installer.exe",
            "QuickStockBot-README.txt"
          ) -DestinationPath "QuickStockBot-windows.zip"

      # ── Publish GitHub Release ───────────────────────────────────────────────
      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}"
          gh release create $version `
            --title "QuickStockBot $version" `
            --generate-notes `
            --latest `
            "QuickStockBot-windows.zip#QuickStockBot $version — Windows Installer + Bot"
